name: Release

on:
  push:
    branches: [master]

# Prevent concurrent releases
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for semantic-release
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Run semantic-release (GitHub release + version bump)
        id: semantic
        run: |
          # Run semantic-release and capture output
          OUTPUT=$(npx semantic-release 2>&1 || true)
          echo "$OUTPUT"
          
          # Check if a new version was released
          if echo "$OUTPUT" | grep -q "Published GitHub release"; then
            NEW_VERSION=$(node -p 'require("./package.json").version')
            echo "released=true" >> $GITHUB_OUTPUT
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "Released version: $NEW_VERSION"
          else
            echo "released=false" >> $GITHUB_OUTPUT
            echo "No new release"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm (only after GitHub release succeeds)
        if: steps.semantic.outputs.released == 'true'
        id: npm_publish
        run: |
          echo "Publishing version ${{ steps.semantic.outputs.version }} to npm..."
          npm publish --provenance --access public
          echo "published=true" >> $GITHUB_OUTPUT
          echo "Successfully published to npm"
        # No NODE_AUTH_TOKEN needed - uses OIDC Trusted Publishing

      - name: Rollback on npm publish failure
        if: failure() && steps.semantic.outputs.released == 'true' && steps.npm_publish.outputs.published != 'true'
        run: |
          echo "::error::npm publish failed! Rolling back GitHub release..."
          VERSION="${{ steps.semantic.outputs.version }}"
          
          # Delete the GitHub release
          gh release delete "v$VERSION" --yes || echo "Release may not exist"
          
          # Delete the tag
          git push origin --delete "refs/tags/v$VERSION" || echo "Tag may not exist"
          
          echo "Rollback complete. Fix the npm issue and retry."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify release consistency
        if: steps.semantic.outputs.released == 'true' && steps.npm_publish.outputs.published == 'true'
        run: |
          VERSION="${{ steps.semantic.outputs.version }}"
          echo "Verifying release consistency for version $VERSION..."
          
          # Verify GitHub release exists
          gh release view "v$VERSION" --json tagName || exit 1
          
          # Verify npm package exists (with retry)
          for i in 1 2 3; do
            if npm view "@claritylabs/cl-sdk@$VERSION" version 2>/dev/null; then
              echo "✓ npm package verified"
              break
            fi
            echo "Waiting for npm to propagate... (attempt $i/3)"
            sleep 5
          done
          
          echo "✓ Release consistency verified - GitHub and npm are in sync"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
