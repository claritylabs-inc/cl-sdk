name: Release

on:
  push:
    branches: [master]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
      - run: npm ci
      - run: npm run build
      - name: Save pre-release version
        id: pre
        run: echo "version=$(node -p 'require("./package.json").version')" >> $GITHUB_OUTPUT
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Detect new release
        id: version
        run: |
          # semantic-release's @semantic-release/npm prepare step updates
          # package.json in the working tree (even with npmPublish: false).
          NEW_VERSION=$(node -p 'require("./package.json").version')
          PRE_VERSION="${{ steps.pre.outputs.version }}"
          if [ "$NEW_VERSION" != "$PRE_VERSION" ]; then
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "New release detected: $PRE_VERSION -> $NEW_VERSION"
          else
            echo "version=" >> $GITHUB_OUTPUT
            echo "No new release (version unchanged at $NEW_VERSION)"
          fi
      - name: Publish to GitHub Packages
        if: steps.version.outputs.version != ''
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
