name: Release

on:
  push:
    branches: [master]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - name: Save pre-release version
        id: pre
        run: echo "version=$(node -p 'require("./package.json").version')" >> $GITHUB_OUTPUT
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Detect new release
        id: version
        run: |
          # semantic-release's @semantic-release/npm prepare step updates
          # package.json in the working tree (even with npmPublish: false).
          NEW_VERSION=$(node -p 'require("./package.json").version')
          PRE_VERSION="${{ steps.pre.outputs.version }}"
          if [ "$NEW_VERSION" != "$PRE_VERSION" ]; then
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "New release detected: $PRE_VERSION -> $NEW_VERSION"
          else
            echo "version=" >> $GITHUB_OUTPUT
            echo "No new release (version unchanged at $NEW_VERSION)"
          fi
      - name: Publish to npm
        if: steps.version.outputs.version != ''
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Generate GitHub App token
        if: steps.version.outputs.version != ''
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: claritylabs-inc
      - name: Trigger cl-sdk-docs rebuild
        if: steps.version.outputs.version != ''
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: claritylabs-inc/cl-sdk-docs
          event-type: cl-sdk-version-published
          client-payload: '{"version": "${{ steps.version.outputs.version }}"}'
